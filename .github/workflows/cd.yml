name: Python CD

on:
  workflow_run:
    workflows: ["Python CI"]
    types:
      - completed
    branches:
      - master

concurrency:
  group: deploy-master
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: read
      packages: write

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.workflow_run.head_sha }}

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Sync uv
      run: make install

    - name: Install protoc
      uses: arduino/setup-protoc@v3

    - name: Compile proto
      run: make proto

    - name: Read version from pyproject
      id: version
      run: |
        VERSION="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push image
      env:
        TAG: ${{ github.event.workflow_run.head_sha }}
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        docker build -t "$IMAGE:$TAG" -t "$IMAGE:$VERSION" -t "$IMAGE:latest" .
        docker push "$IMAGE:$TAG"
        docker push "$IMAGE:$VERSION"
        docker push "$IMAGE:latest"

  deploy:
    needs: build
    uses: ./.github/workflows/deploy.yml
    with:
      image_tag: ${{ github.event.workflow_run.head_sha }}
    secrets: inherit
    permissions:
      contents: read
      packages: read

  release:
    runs-on: ubuntu-latest
    needs: [build, deploy]

    permissions:
      contents: write

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      VERSION: ${{ needs.build.outputs.version }}
      SHA: ${{ github.event.workflow_run.head_sha }}

    steps:
    - name: Create GitHub release
      id: release
      run: |
        if gh release view "$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
          echo "Release $VERSION already exists, skipping"
          echo "created=false" >> "$GITHUB_OUTPUT"
        else
          gh release create "$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$SHA" \
            --title "$VERSION" \
            --generate-notes
          echo "created=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Announce release in the Telegram log chat
      if: steps.release.outputs.created == 'true'
      env:
        TG_TOKEN: ${{ secrets.TELEGRAM_API_TOKEN }}
        TG_CHAT: ${{ secrets.TELEGRAM_LOG_CHAT_ID }}
      run: |
        if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ]; then
          echo "Telegram secrets are not set, skipping the announcement"
          exit 0
        fi
        NOTES="$(gh release view "$VERSION" --repo "$GITHUB_REPOSITORY" --json body -q .body | head -c 3000)"
        URL="https://github.com/$GITHUB_REPOSITORY/releases/tag/$VERSION"
        TEXT="$(printf '🚀 Deployed %s\n%s\n\n%s' "$VERSION" "$URL" "$NOTES")"
        if ! curl -sS -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
          --data-urlencode "chat_id=$TG_CHAT" \
          --data-urlencode "text=$TEXT" \
          --data-urlencode "disable_web_page_preview=true" \
          >/dev/null; then
          echo "::warning::Telegram release announcement failed"
        fi
