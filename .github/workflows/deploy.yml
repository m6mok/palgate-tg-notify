name: Deploy

# Reusable deploy: pulls IMAGE:<image_tag> on the server, swaps the
# container, waits for the healthcheck and reverts to the previously
# running image on failure. The `target` input picks the instance: "prod"
# (the default) swaps the production container, "prestable" swaps the
# mirror container that polls the same gate but notifies the prestable
# chat from its own volume/env file. Called by cd.yml (prestable deploy),
# promote.yml (prod deploy), rollback.yml (redeploy of an older tag) and
# prestable.yml (any tag to prestable).

on:
  workflow_call:
    inputs:
      image_tag:
        description: "Image tag to deploy (release version or commit SHA)"
        required: true
        type: string
      target:
        description: "Deploy target: prod or prestable"
        required: false
        type: string
        default: prod

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read

    steps:
    - name: Configure SSH
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
      run: |
        mkdir -p ~/.ssh
        echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
        chmod 644 ~/.ssh/known_hosts

    - name: Deploy to server
      env:
        TAG: ${{ inputs.image_tag }}
        TARGET: ${{ inputs.target }}
        GHCR_USER: ${{ github.actor }}
        GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        ENV_FILE_PROD: ${{ secrets.ENV_FILE_PATH }}
        ENV_FILE_PRESTABLE: ${{ secrets.ENV_FILE_PATH_PRESTABLE }}
      run: |
        case "$TARGET" in
          prod)
            CONTAINER=palgate-tg-notify-container
            VOLUME=palgate-data
            ENV_FILE="$ENV_FILE_PROD"
            ;;
          prestable)
            CONTAINER=palgate-tg-notify-prestable
            VOLUME=palgate-prestable-data
            ENV_FILE="$ENV_FILE_PRESTABLE"
            ;;
          *)
            echo "::error::Unknown deploy target '$TARGET'"
            exit 1
            ;;
        esac
        if [ -z "$ENV_FILE" ]; then
          echo "::error::Env file path secret is not set for target '$TARGET'"
          exit 1
        fi
        ssh -i ~/.ssh/deploy_key "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" /bin/bash <<EOF
        set -euo pipefail

        # Pull the new image first — the old container keeps running meanwhile
        echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
        docker pull "$IMAGE:$TAG"
        docker logout ghcr.io

        # Remember the currently running image for rollback
        PREV_IMAGE=\$(docker inspect -f '{{.Config.Image}}' "$CONTAINER" 2>/dev/null || true)

        docker rm -f "$CONTAINER" 2>/dev/null || true
        docker run -d \
          --name "$CONTAINER" \
          --restart unless-stopped \
          --env-file "$ENV_FILE" \
          -v "$VOLUME":/app/data \
          "$IMAGE:$TAG"

        # Health check: wait for the container's own HEALTHCHECK (heartbeat
        # freshness) to report healthy; fall back to Running for images
        # without a healthcheck.
        HEALTH=starting
        for _ in \$(seq 1 18); do
          sleep 10
          if [ "\$(docker inspect -f '{{.State.Running}}' "$CONTAINER" 2>/dev/null)" != "true" ] \
            || [ "\$(docker inspect -f '{{.RestartCount}}' "$CONTAINER")" != "0" ]; then
            HEALTH=dead
            break
          fi
          HEALTH=\$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}healthy{{end}}' "$CONTAINER")
          [ "\$HEALTH" = "starting" ] || break
        done

        if [ "\$HEALTH" != "healthy" ]; then
          echo "Deploy failed (health: \$HEALTH), container logs:"
          docker logs "$CONTAINER" || true
          docker rm -f "$CONTAINER" 2>/dev/null || true
          if [ -n "\$PREV_IMAGE" ]; then
            echo "Rolling back to \$PREV_IMAGE"
            docker run -d \
              --name "$CONTAINER" \
              --restart unless-stopped \
              --env-file "$ENV_FILE" \
              -v "$VOLUME":/app/data \
              "\$PREV_IMAGE"
          fi
          exit 1
        fi

        docker image prune -f
        EOF
