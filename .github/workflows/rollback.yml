name: Rollback

# Redeploys a previously built image. Dispatched manually from the Actions
# UI or by the ops bot's /rollback command. Never creates tags or releases
# and never touches the `latest` tag — it only swaps the running container.

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Release version (e.g. 2.0.0) or commit SHA to redeploy"
        required: true
        type: string

concurrency:
  group: deploy-master
  cancel-in-progress: false

jobs:
  deploy:
    uses: ./.github/workflows/deploy.yml
    with:
      image_tag: ${{ inputs.image_tag }}
    secrets: inherit
    permissions:
      contents: read
      packages: read
