name: Python CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  integration:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Checkout mock PalGate server
      uses: actions/checkout@v4
      with:
        repository: m6mok/palgate_server
        ref: master
        token: ${{ secrets.PALGATE_SERVER_TOKEN }}
        path: palgate_server

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Sync uv
      run: make install

    - name: Install protoc
      uses: arduino/setup-protoc@v3

    - name: Compile proto
      run: make proto

    - name: Run lint
      run: make lint

    - name: Run mypy
      run: make mypy

    - name: Run tests
      run: make test
      env:
        PALGATE_SERVER_DIR: ${{ github.workspace }}/palgate_server

    - name: Build Docker image
      run: |
        docker build -t palgate-tg-notify .
